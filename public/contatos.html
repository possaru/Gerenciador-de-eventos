<!DOCTYPE html>
<html>

<head>
    <title>Home</title>
    <link rel="stylesheet" type="text/css" href="eventos.css">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta charset="UTF-8">
</head>

<body>
    <div id="root-container">
        <div style="text-align: center">
            <h1>Contatos</h1>
        </div>
        <div id="list-bg">
            <div id="list-columns">
                <div id="list-column-button-container">
                    <button class="list-column-button">Nome</button>
                    <button class="list-column-button">Serviço</button>
                    <button class="list-column-button">Valor base</button>
                    <button class="list-column-button">Valor tipo</button>
                    <button class="list-column-button">Disponibilidade</button>
                    <button class="list-column-button">Telefone</button>
                </div>
            </div>
            <div id="list-rows">
            </div>

            <script>
                var row_count = 0;
                fetch(`${window.location.href}=rows`)
                    .then(function (response) {
                        return response.json();
                    }
                    )
                    .then(function (json) {
                        console.log(json);
                        for (i in json) {
                            console.log(`building row: ${i}`);
                            document.getElementById('list-rows').insertAdjacentHTML(
                                'beforeend',
                                `<div id="${json[i]['ID']}" class="list-item">\
                                    <div class="list-cols">\
                                        ${json[i]['nome']}\
                                    </div>\
                                    <div class="list-cols">\
                                        ${json[i]['serviço']}\
                                    </div>\
                                    <div class="list-cols">\
                                        ${json[i]['valor_base']}\
                                    </div>\
                                    <div class="list-cols">\
                                        ${json[i]['valor_tipo']}\
                                    </div>\
                                    <div class="list-cols">\
                                        ${json[i]['disponibilidade']}\
                                    </div>\
                                    <div class="list-cols">\
                                        ${json[i]['telefone']}\
                                    </div>\
                                </div>`
                            )

                        }
                    })
            </script>
        </div>
    </div>
</body>

</html>
