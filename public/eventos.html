<!DOCTYPE html>
<html>

<head>
    <title>Home</title>
    <link rel="stylesheet" type="text/css" href="eventos.css">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta charset="UTF-8">
</head>

<body>
    <div id="root-container">
        <div style="text-align: center">
            <h1>Eventos</h1>
        </div>
        <div id="list-bg">
            <div id="list-columns">
                <div id="list-column-button-container">
                    <button class="list-column-button">Cliente</button>
                    <button class="list-column-button">Data</button>
                    <button class="list-column-button">Local</button>
                    <button class="list-column-button">Tipo</button>
                    <button class="list-column-button">Convidados</button>
                    <button class="list-column-button">Responsável</button>
                </div>
            </div>
            <div id="list-rows">
            </div>

            <script>
                var row_count = 0;
                fetch(`${window.location.href}=rows`)
                    .then(function (response) {
                        return response.json();
                    }
                    )
                    .then(function (json) {
                        console.log(json);
                        for (i in json) {
                            console.log(`building row: ${i}`);
                            document.getElementById('list-rows').insertAdjacentHTML(
                                'beforeend',
                                `<div id="row-${i}" class="list-item">\
                                    <div class="list-cols">\
                                        ${json[i]['cliente']}\
                                    </div>\
                                    <div class="list-cols">\
                                        ${json[i]['data']}\
                                    </div>\
                                    <div class="list-cols">\
                                        ${json[i]['local']}\
                                    </div>\
                                    <div class="list-cols">\
                                        ${json[i]['tipo']}\
                                    </div>\
                                    <div class="list-cols">\
                                        ${json[i]['convidados']}\
                                    </div>\
                                    <div class="list-cols">\
                                        ${json[i]['responsável']}\
                                    </div>\
                                </div>`
                            )

                        }
                    })
            </script>
        </div>
    </div>
</body>

</html>
