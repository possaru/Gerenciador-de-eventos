<!DOCTYPE html>
<html>

<head>
    <title>Login</title>
    <link rel="stylesheet" type="text/css" href="login.css">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta charset="UTF-8">
</head>

<body>
    <div id="login-container">
        <div class="login-items" id="login-background"></div>
        <div>
            <div id="login-credentials-container">
                <div>Senha:<input class="login-items" id="login-password">
                    <br> (Pressione Entrar)</input>
                </div>
            </div>
            <div id="login-credentials-container">
                <div>Login:<input class="login-items" id="login-id"></input>
                </div>
            </div>
        </div>
        <button style="position: absolute; margin-top: 300px;" onclick="login()">Entrar</button>
        <div style="position: absolute; margin-top: 350px;" id="status"></div>
    </div>

    <script>
        function login() {
            let id = document.getElementById("login-id").value
            let pass = document.getElementById("login-password").value
            console.log(`Checking credentials: [ ${id} : ${pass} ]`);
            let result;
            fetch(`${window.location.href}/cred_check=/${id}/${pass}`)
                .then(function (response) {
                    return response.json()
                })
                .then(function (json) {
                    result = json['credential_check']
                    console.log(result)
                    if (result == 'valid user') {
                        window.location.href = '/home'
                    } else { document.getElementById('status').textContent = "algo deu errado" }
                })
        }
    </script>
</body>

</html>
