<!DOCTYPE html>
<html>

<head>
    <title>Home</title>
    <link rel="stylesheet" type="text/css" href="eventos.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta charset="UTF-8">
</head>

<body>
    <div id="root-container">
        <!-- HEADER -->
        <div id="top-bar">
            <img src="/resources/mais.png" class="add-button" onclick="goToCadastro()">
            <img src="/resources/voltar.png" class="back-button" onclick="goHome()">

            <div class="title-container">
                <img src="/resources/usuarios.png" class="title-icon">
                <h1>Usuarios</h1>
            </div>

        </div>

        <div id="list-bg">
            <div id="list-columns">
                <div id="list-column-button-container">
                    <button class="list-column-button">Nome</button>
                    <button class="list-column-button">Função</button>
                    <button class="list-column-button">Expediente</button>
                    <button class="list-column-button">Telefone</button>
                </div>
            </div>
            <div id="list-rows">
            </div>

            <script>
                function goHome() {
                    window.location.href = "/home";
                }
            </script>

            <script>
                function goToCadastro() {
                    window.location.href = "/cadastrousuarios";
                }
            </script>

            <script>
                var row_count = 0;
                fetch(`${window.location.href}=rows`)
                    .then(function (response) {
                        return response.json();
                    }
                    )
                    .then(function (json) {
                        console.log(json);
                        for (i in json) {
                            console.log(`building row: ${i}`);
                            document.getElementById('list-rows').insertAdjacentHTML(
                                'beforeend',
                                `<div id="row-${i}" class="list-item">\
                                    <div class="list-cols">\
                                        ${json[i]['nome']}\
                                    </div>\
                                    <div class="list-cols">\
                                        ${json[i]['funcao']}\
                                    </div>\
                                    <div class="list-cols">\
                                        ${json[i]['expediente']}\
                                    </div>\
                                    <div class="list-cols">\
                                        ${json[i]['telefone']}\
                                    </div>\
                                </div>`
                            )

                        }
                    })
            </script>
        </div>
    </div>
</body>

</html>
